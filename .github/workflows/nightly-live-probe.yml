name: Nightly live discovery probe

# Runs the real discovery pipeline against live, free public-proxy sources —
# something the regular CI (push/PR) deliberately never does, since it would
# make ordinary commits flaky. This catches supply-chain rot (a source URL
# going stale, a format change, a country drying up) before users report it.
# A red run here is a signal to investigate, not a merge gate: nothing else
# depends on this workflow.
on:
  schedule:
    # 07:00 UTC daily.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-probe:
    name: Live public-proxy discovery (US)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      # Free proxy availability is inherently volatile, so one transient miss
      # (a slow source, an unlucky sample) shouldn't read the same as the
      # pipeline being broken. Retry once before treating it as a real signal.
      - name: Run live discovery test (one retry on failure)
        run: |
          npm run test:public || (echo "First attempt failed, retrying once…" && sleep 15 && npm run test:public)

      - name: Annotate failure
        if: failure()
        run: echo "::warning::Nightly live discovery probe failed twice — a free-proxy source may be down, rate-limiting, or discovery may be broken. See the test:public output above."
