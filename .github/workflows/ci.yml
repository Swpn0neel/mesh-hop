name: CI

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run version:check

  test:
    name: Unit tests (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm test

  website:
    name: Website validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  rust:
    name: Rust lint (fmt + clippy)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Fetch the uBlock Origin .xpi (gitignored; verified by SHA-256).
      - name: Fetch uBlock Origin extension
        shell: pwsh
        run: |
          $url  = "https://github.com/gorhill/uBlock/releases/download/1.72.2/uBlock0_1.72.2.firefox.signed.xpi"
          $dest = "src-tauri/resources/uBlock0_1.72.2.firefox.signed.xpi"
          New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing

      # generate_context! requires the frontend dist and the sidecar binary to
      # exist at build time. Build the cheap frontend and drop a placeholder
      # sidecar so clippy can compile without the full Node SEA build.
      - run: npm ci
      - run: npm run desktop:prepare
      - name: Create placeholder sidecar
        shell: bash
        run: |
          triple=$(rustc --print host-tuple)
          : > "src-tauri/binaries/meshhop-engine-${triple}.exe"
      - name: rustfmt
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - name: clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  installer:
    name: Windows installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Fetch uBlock Origin extension
        shell: pwsh
        run: |
          $url  = "https://github.com/gorhill/uBlock/releases/download/1.72.2/uBlock0_1.72.2.firefox.signed.xpi"
          $dest = "src-tauri/resources/uBlock0_1.72.2.firefox.signed.xpi"
          New-Item -ItemType Directory -Force -Path (Split-Path $dest) | Out-Null
          Invoke-WebRequest -Uri $url -OutFile $dest -UseBasicParsing

      - run: npm ci
      - run: npm run version:check
      - name: Build Tauri installers
        run: npm run desktop:build
      - name: Stage release assets
        run: npm run release:stage
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshhop-windows-${{ github.sha }}
          path: release/
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish stable GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, website, rust, installer]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/download-artifact@v4
        with:
          name: meshhop-windows-${{ github.sha }}
          path: release

      - name: Validate release metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          test "${GITHUB_REF_NAME}" = "v${version}"
          node -e "const m=require('./release/meshhop-release.json'); if (m.version !== process.argv[1] || m.tag !== process.argv[2] || m.channel !== 'stable') process.exit(1)" "${version}" "${GITHUB_REF_NAME}"
          test -s release/MeshHop-windows-x64-setup.exe
          test -s release/MeshHop-windows-x64.msi
          test -s release/SHA256SUMS.txt

      - name: Create or update release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="MeshHop ${tag}"
          notes=".github/release-notes/${tag}.md"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Updating existing release ${tag}."
            if [[ -f "${notes}" ]]; then
              gh release edit "${tag}" --repo "${GITHUB_REPOSITORY}" --title "${title}" --notes-file "${notes}"
            else
              gh release edit "${tag}" --repo "${GITHUB_REPOSITORY}" --title "${title}"
            fi
          elif [[ -f "${notes}" ]]; then
            gh release create "${tag}" --repo "${GITHUB_REPOSITORY}" --verify-tag --draft --title "${title}" --notes-file "${notes}"
          else
            gh release create "${tag}" --repo "${GITHUB_REPOSITORY}" --verify-tag --draft --title "${title}" --generate-notes
          fi

          gh release upload "${tag}" --repo "${GITHUB_REPOSITORY}" release/* --clobber
          gh release edit "${tag}" --repo "${GITHUB_REPOSITORY}" --title "${title}" --draft=false --latest
